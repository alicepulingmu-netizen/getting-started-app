name: CI/CD Pipeline

on:
  push:
    branches:
      - main # 当有代码推送到 main 分支时触发

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码 (Checkout code)
        uses: actions/checkout@v3

      # 这里可以按需插入测试步骤，比如 run: npm test

      - name: 登录 Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: 构建并推送到 Docker Hub (Build and Push)
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/my-learning-app:latest # 替换为你的镜像名
